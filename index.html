<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyra — Creative Paradise</title>
    <style>
        :root {
            --dark-brown: #2C2118;     
            --choco: #3F2E24;          
            --cream: #F8F1E9;          
            --gold: #E8B923;           
            --teal: #00C9A8;           
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark-brown);
            color: var(--cream);
            line-height: 1.6;
        }
        
        header {
            background: linear-gradient(rgba(44,33,24,0.95), rgba(44,33,24,0.95));
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
        }
        
        nav a {
            color: var(--cream);
            margin-left: 2rem;
            text-decoration: none;
            font-weight: 500;
        }
        
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(44,33,24,0.65), rgba(44,33,24,0.75)), 
                        url('https://picsum.photos/id/1015/1920/1080') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        
        .hero-content {
            max-width: 800px;
            padding: 2rem;
        }
        
        .hero h1 {
            font-size: 4.8rem;
            margin-bottom: 1rem;
            color: white;
        }
        
        .hero .slogan {
            font-size: 2.3rem;
            color: var(--gold);
            margin-bottom: 2rem;
        }
        
        .cta-button {
            background: var(--teal);
            color: #1C140F;
            padding: 1.1rem 2.8rem;
            font-size: 1.25rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .cta-button:hover {
            background: var(--gold);
            transform: scale(1.05);
        }
        
        section {
            padding: 5rem 5%;
        }
        
        .services {
            background: var(--choco);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .card {
            background: #3F2E24;
            padding: 2.2rem;
            border-radius: 16px;
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-10px);
        }
        
        .vision {
            background: linear-gradient(135deg, #3F2E24, var(--dark-brown));
        }
        
        footer {
            background: #1C140F;
            padding: 3rem 5%;
            text-align: center;
        }
        
        h2, h3 {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <!-- Same content as before -->

        <nav>
