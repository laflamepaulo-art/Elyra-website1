<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyra — Creative Paradise</title>
    <style>
        :root {
            --dark: #1F1A14;
            --choco: #2C2118;
            --cream: #F5EDE4;
            --gold: #E8B923;
            --teal: #00D4B8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--cream);
            line-height: 1.7;
        }
        
        header {
            background: rgba(31, 26, 20, 0.98);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }
        
        .logo {
            font-family: 'Georgia', 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #E8B923, #F4D38A, #E8B923);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        nav {
            margin-left: auto;
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            color: var(--cream);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }
        
        nav a:hover {
            color: var(--gold);
        }
        
        .hero {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <!-- Replace this link with your actual logo icon -->
            <img src="https://i.imgur.com/eb7wnpt.jpg" alt="Elyra Icon" class="logo-icon">
            <a href="#" class="logo">Elyra</a>
        </div>
        
        <nav>
            <a href="#services">Services</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#vision">Vision</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-bg" id="bg1" style="background-image: url('https://i.imgur.com/eb7wnpt.jpg'); opacity: 1;"></div>
        <div class="hero-bg" id="bg2" style="background-image: url('https://i.imgur.com/X5PJtko.jpg'); opacity: 0;"></div>
        <div class="hero-bg" id="bg3" style="background-image: url('https://i.imgur.com/AzK2tYf.jpg'); opacity: 0;"></div>
        <div class="hero-bg" id="bg4" style="background-image: url('https://i.imgur.com/h6MBbWR.jpg'); opacity: 0;"></div>
        
        <div class="hero-content">
            <h1>Elyra</h1>
            <p class="slogan">Creative Paradise</p>
            <p style="font-size: 1.4rem; margin-bottom: 2rem;">Where lens meets lyre.<br>Raw ideas become resonant stories.</p>
            <button onclick="alert('Welcome to Elyra — Creative Paradise! 🚀')" 
                    style="background:var(--teal); color:#1F1A14; padding:1.2rem 3rem; font-size:1.3rem; border:none; border-radius:50px; cursor:pointer; font-weight:600;">
                Enter Your Paradise
            </button>
        </div>
    </section>

    <!-- Services, Portfolio, Vision, Contact sections... (copy from your previous full code) -->

    <script>
        let current = 0;
        const backgrounds = document.querySelectorAll('.hero-bg');
        
        function changeBackground() {
            backgrounds[current].style.opacity = 0;
            current = (current + 1) % backgrounds.length;
            backgrounds[current].style.opacity = 1;
        }
        
        setInterval(changeBackground, 6500);
    </script>
</body>
</html>
