<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyra — Creative Paradise</title>
    <style>
        :root {
            --dark: #1F1A14;
            --choco: #2C2118;
            --cream: #F5EDE4;
            --gold: #E8B923;
            --teal: #00D4B8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--cream);
            line-height: 1.7;
        }
        
        header {
            background: rgba(31, 26, 20, 0.98);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
        }
        
        .logo {
            font-family: 'Georgia', 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #E8B923, #F4D38A, #E8B923);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        nav {
            margin-left: auto;
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            color: var(--cream);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }
        
        nav a:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <!-- Logo Icon (using one of the clean versions) -->
            <img src="https://i.imgur.com/eb7wnpt.jpg" alt="Elyra Logo" class="logo-icon" style="border-radius: 50%; object-fit: cover;">
            <a href="#" class="logo">Elyra</a>
        </div>
        
        <nav>
            <a href="#services">Services</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#vision">Vision</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Rest of your sections (hero, services, etc.) remain the same -->
    <!-- ... paste the rest of your previous sections here ... -->

    <script>
        // Slideshow code remains the same
        let current = 0;
        const backgrounds = document.querySelectorAll('.hero-bg');
        
        function changeBackground() {
            backgrounds[current].style.opacity = 0;
            current = (current + 1) % backgrounds.length;
            backgrounds[current].style.opacity = 1;
        }
        
        setInterval(changeBackground, 6500);
    </script>
</body>
</html>
